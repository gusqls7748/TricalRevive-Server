services:
  postgres:
    image: postgres:16
    container_name: tricalrevive-postgres
    environment:
      POSTGRES_USER: tricaladmin
      POSTGRES_PASSWORD: tricalpass123
      POSTGRES_DB: tricalrevive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tricalrevive-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: