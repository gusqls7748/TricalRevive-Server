services:
  postgres:
    image: postgres:16
    container_name: tricalrevive-postgres
    environment:
      POSTGRES_USER: tricaladmin
      POSTGRES_PASSWORD: tricalpass123
      POSTGRES_DB: tricalrevive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tricalrevive-redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: tricalrevive-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: tricalrevive-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  
  apm-server:
    image: docker.elastic.co/apm/apm-server:8.15.0
    container_name: tricalrevive-apm-server
    depends_on:
      - elasticsearch
      - kibana
    ports:
      - "8200:8200"
    command: >
      apm-server -e
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["elasticsearch:9200"]
      -E apm-server.kibana.enabled=true
      -E apm-server.kibana.host=kibana:5601
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/"]
      retries: 10

volumes:
  postgres_data:
  es_data: