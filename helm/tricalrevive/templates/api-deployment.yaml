apiVersion: apps/v1
kind: Deployment
metadata:
  name: tricalrevive-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: tricalrevive-api
  template:
    metadata:
      labels:
        app: tricalrevive-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.api.containerPort }}